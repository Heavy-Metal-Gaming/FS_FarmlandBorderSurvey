name: Release

on:
  push:
    tags:
      - 'release/*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      fs_versions: ${{ steps.meta.outputs.fs_versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse tag metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/release/}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

          # Determine if this is a pre-release
          if echo "$TAG" | grep -qE '-(alpha|beta)\.'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          # Read FS versions to build from config file
          FS_VERSIONS=$(cat fs_versions.json | jq -c '.versions')
          echo "fs_versions=${FS_VERSIONS}" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fs_version: ${{ fromJson(needs.prepare.outputs.fs_versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set mod name
        id: mod
        run: |
          echo "mod_name=FS${{ matrix.fs_version }}_FarmlandBorderSurvey" >> "$GITHUB_OUTPUT"

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build mod artifact
        run: |
          chmod +x ./build.sh
          ./build.sh build "${{ matrix.fs_version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.mod.outputs.mod_name }}
          path: dist/${{ steps.mod.outputs.mod_name }}.zip

  publish:
    needs: [prepare, build-and-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect zip files
        id: collect
        run: |
          find artifacts -name '*.zip' -exec cp {} . \;
          ls -la *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release/${{ needs.prepare.outputs.version }}
          name: "Farmland Border Survey v${{ needs.prepare.outputs.version }}"
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          generate_release_notes: false
          body: |
            ## Farmland Border Survey v${{ needs.prepare.outputs.version }}

            Displays softly glowing ribbon walls along the boundaries of your owned and contracted farmlands in Farming Simulator 25.

            ### Features
            - Two render modes: persistent 3D ribbon walls (mesh) or debug-line overlay
            - Customizable border color, height, render mode, and display scope
            - Contract-aware borders with distinct color
            - Colorblind mode support
            - Multiplayer compatible with synced settings
            - Ships with English and German translations

            ### Installation
            1. Download the `FS25_FarmlandBorderSurvey.zip` file below
            2. Place the zip (do **not** extract) into your FS25 mods folder
            3. Enable the mod in-game

            See the [README](https://github.com/Heavy-Metal-Gaming/FS_FarmlandBorderSurvey#readme) for full documentation.
          files: "*.zip"
